services:
  - type: web
    name: whythefuckcanineverfindagoodmovietowatch
    runtime: node
    plan: starter
    buildCommand: yarn
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: TMDB_API_KEY
        sync: false
      - key: OMDB_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: moviepicker-db
          property: connectionString
      - key: APP_BASE_URL
        sync: false
      - key: AUTH_ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SESSION_COOKIE_NAME
        value: moviepicker_session
      - key: SESSION_SECRET
        sync: false
  - type: worker
    name: whythefuckcanineverfindagoodmovietowatch-worker
    runtime: node
    plan: starter
    buildCommand: yarn
    startCommand: npm run pipeline:auto -- --ingest-every-hours=24 --poll-seconds=30 --batch-size=300 --concurrency=4 --max-attempts=4 --max-ids=100000
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: TMDB_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: moviepicker-db
          property: connectionString

databases:
  - name: moviepicker-db
    plan: starter
